name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check + Clippy + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --all-targets

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  integration:
    name: Integration Tests (BIRD)
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Start BIRD container
        run: docker compose -f docker/docker-compose.test.yml up -d --build

      - name: Wait for BIRD socket
        run: |
          for i in $(seq 1 15); do
            if [ -S /tmp/ixforge-bird-test/bird.ctl ]; then
              echo "BIRD socket ready"
              exit 0
            fi
            echo "Waiting for BIRD socket... ($i/15)"
            sleep 1
          done
          echo "BIRD socket not found after 15s"
          exit 1

      - name: Run integration tests
        env:
          BIRD_SOCKET: /tmp/ixforge-bird-test/bird.ctl
        run: cargo test --test integration_test -- --ignored

      - name: Stop BIRD container
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down

  build:
    name: Build (linux/amd64)
    runs-on: ubuntu-latest
    needs: [check, fmt]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ixforge-agent-linux-amd64
          path: target/release/ixforge-agent
